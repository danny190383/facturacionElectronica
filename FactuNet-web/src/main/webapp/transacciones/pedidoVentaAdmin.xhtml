<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:c="http://java.sun.com/jsp/jstl/core"
      xmlns:h="http://java.sun.com/jsf/html">

    <body>

        <ui:composition template="./../plantilla/main-templateMenu.xhtml">
            <ui:define name="botones">
                 <div class="caja-botones-arriba">
                    <p:toolbar id="pnlBotones">
                        <f:facet name="left">
                            <p:commandButton value="#{msg.pedidoVenta}"  
                                             icon="ui-icon-search"
                                             process="@this"
                                             actionListener="#{pedidoVentaBean.verBusquedaPedidos}" />
                            
                            <p:commandButton value="#{msg.notaMedica}"  
                                             icon="ui-icon-search"
                                             process="@this"
                                             actionListener="#{pedidoVentaBean.verBusquedaNotaMedica}"
                                             rendered="#{login.empleado.cuenta.empleado.empresa.tipoEmpresa eq 2}"/>
                            
                        </f:facet>
                    </p:toolbar>
                 </div>
            </ui:define>
            <ui:define name="content">

                <!-- =====================================================
                     ESTILOS: usar <style> directo, NO h:outputStylesheet
                     con CDATA. h:outputStylesheet es solo para archivos externos.
                ===================================================== -->
                <style type="text/css">

                /* ===================================================
                   A. DATAGRID EXTERNO DE MESAS (columns="2")
                   Fuerza 50% exacto por columna sin importar contenido
                =================================================== */

                /* Tabla raíz del dataGrid de mesas */
                .ui-datagrid .ui-datagrid-content > table {
                    width: 100% !important;
                    table-layout: fixed !important;
                    border-collapse: collapse !important;
                }

                /* Cada celda td del dataGrid de mesas: exactamente 50% */
                .ui-datagrid .ui-datagrid-content > table > tbody > tr > td {
                    width: 50% !important;
                    max-width: 50% !important;
                    vertical-align: top !important;
                    overflow: hidden !important;
                    box-sizing: border-box !important;
                    padding: 4px !important;
                }

                /* Panel (tarjeta de mesa) dentro de cada celda: 
                   ocupa todo el ancho disponible sin salirse */
                .ui-datagrid .ui-datagrid-content > table > tbody > tr > td > .ui-panel {
                    width: 100% !important;
                    max-width: 100% !important;
                    box-sizing: border-box !important;
                    overflow: hidden !important;
                    display: block !important;
                }

                /* Contenido interior del panel de mesa */
                .ui-datagrid .ui-datagrid-content > table > tbody > tr > td > .ui-panel > .ui-panel-content {
                    width: 100% !important;
                    box-sizing: border-box !important;
                    overflow: hidden !important;
                    padding: 4px !important;
                }

                /* ===================================================
                   B. DATAGRID INTERNO DE PEDIDOS (columns="1")
                   Dentro del scrollPanel, también debe respetar 100%
                =================================================== */

                /* scrollPanel: contener todo horizontalmente */
                .ui-scrollpanel {
                    box-sizing: border-box !important;
                    width: 100% !important;
                }

                .ui-scrollpanel .ui-scrollpanel-container {
                    box-sizing: border-box !important;
                    width: 100% !important;
                }

                .ui-scrollpanel .ui-scrollpanel-content {
                    box-sizing: border-box !important;
                    width: 100% !important;
                    overflow-x: hidden !important;
                    padding-right: 18px !important; /* espacio para scrollbar vertical */
                }

                /* Tabla interna del dataGrid de pedidos (columns="1") */
                .ui-scrollpanel .ui-datagrid .ui-datagrid-content > table {
                    width: 100% !important;
                    table-layout: fixed !important;
                }

                .ui-scrollpanel .ui-datagrid .ui-datagrid-content > table > tbody > tr > td {
                    width: 100% !important;
                    max-width: 100% !important;
                    overflow: hidden !important;
                    box-sizing: border-box !important;
                }

                /* ===================================================
                   C. panelGrid de cabecera de cada pedido (columns="4")
                   Debe ajustarse al ancho disponible
                =================================================== */

                /* El h:panelGrid con columns="4" que contiene 
                   checkbox + datos cliente + telefono + botones */
                .ui-scrollpanel .ui-panelgrid {
                    width: 100% !important;
                    table-layout: fixed !important;
                    box-sizing: border-box !important;
                }

                .ui-scrollpanel .ui-panelgrid td {
                    overflow: hidden !important;
                    box-sizing: border-box !important;
                    vertical-align: top !important;
                }

                /* ===================================================
                   D. DATATABLE DE DETALLE (tablaFacturaVentaDetalle)
                   ID namespaceado JSF: usar [id*=] en lugar de [id=] o [id$=]
                =================================================== */

                /* Selector robusto para ID namespaceado de JSF:
                   el ID real sera algo como: frmCabecera:j_idt45:tablaFacturaVentaDetalle */
                [id*="tablaFacturaVentaDetalle"].ui-datatable .ui-datatable-tablewrapper > table {
                    table-layout: fixed !important;
                    width: 100% !important;
                }

                /* Celdas del detalle: no expandan columnas */
                [id*="tablaFacturaVentaDetalle"].ui-datatable td {
                    overflow: hidden !important;
                    box-sizing: border-box !important;
                    /* NO poner white-space:nowrap aqui globalmente 
                       porque el textarea necesita wrap */
                }

                /* Labels de solo lectura: texto largo con ellipsis */
                [id*="tablaFacturaVentaDetalle"].ui-datatable td label,
                [id*="tablaFacturaVentaDetalle"].ui-datatable td .ui-outputlabel {
                    display: block !important;
                    overflow: hidden !important;
                    text-overflow: ellipsis !important;
                    white-space: nowrap !important;
                    max-width: 100% !important;
                    box-sizing: border-box !important;
                }

                /* Textarea de detalle: wrap normal, no overflow */
                [id*="tablaFacturaVentaDetalle"].ui-datatable td .ui-inputtextarea {
                    width: 90% !important;
                    max-width: 90% !important;
                    box-sizing: border-box !important;
                    white-space: normal !important;
                    resize: none !important;
                    overflow: auto !important;
                }

                /* inputNumber de cantidad: no se desborde */
                [id*="tablaFacturaVentaDetalle"].ui-datatable td .ui-inputnumber {
                    max-width: 100% !important;
                    display: block !important;
                }

                [id*="tablaFacturaVentaDetalle"].ui-datatable td .ui-inputnumber input {
                    width: 80% !important;
                    min-width: 0 !important;
                    box-sizing: border-box !important;
                    text-align: right !important;
                }

                /* Header del datatable (IVA / Total) */
                [id*="tablaFacturaVentaDetalle"].ui-datatable .ui-datatable-header {
                    overflow: hidden !important;
                    box-sizing: border-box !important;
                    width: 100% !important;
                }

                /* panelGrid de 2 columnas (IVA label / Total label) en el header */
                [id*="tablaFacturaVentaDetalle"].ui-datatable .ui-datatable-header .ui-panelgrid {
                    width: 100% !important;
                    table-layout: fixed !important;
                }

                /* ===================================================
                   E. BOTONES: no expandan su celda contenedora
                =================================================== */

                /* Botones de accion dentro del panel de mesa */
                .ui-panel .ui-button {
                    max-width: 100% !important;
                    box-sizing: border-box !important;
                    overflow: hidden !important;
                    text-overflow: ellipsis !important;
                    white-space: nowrap !important;
                }

                /* Boton con texto largo: permitir que se achique */
                .ui-panel .ui-panelgrid td .ui-button {
                    max-width: 100% !important;
                    min-width: 0 !important;
                }

                /* El panelGrid de 5 botones (buscar cliente, nuevo, etc.) */
                .ui-panel > .ui-panel-content > .ui-panelgrid {
                    width: 100% !important;
                    box-sizing: border-box !important;
                }

                /* ===================================================
                   F. FORZAR que el p:panel de mesa NO crezca
                   mas alla del espacio disponible (altura fija)
                =================================================== */
                .ui-panel[style*="height:400px"] {
                    overflow: hidden !important;
                    box-sizing: border-box !important;
                }

                .ui-panel[style*="height:400px"] .ui-panel-content {
                    height: calc(400px - 34px) !important; /* 34px = header del panel */
                    overflow: hidden !important;
                    box-sizing: border-box !important;
                    padding: 4px !important;
                }

                /* ===================================================
                    F. AJUSTES PARA PANTALLA TÁCTIL (EQUILIBRADO)
                 =================================================== */

                 /* Botones con texto (Buscar cliente, Facturar, etc) */
                 .modo-tactil .ui-button {
                     height: 34px !important; /* Altura cómoda pero no exagerada */
                     padding: 2px 10px !important;
                     margin: 2px !important;
                 }

                 .modo-tactil .ui-button-text {
                     font-size: 12px !important; /* Texto estándar legible */
                     font-weight: bold !important;
                 }

                 /* Botones de solo icono (Imprimir, Eliminar, Buscar Producto) */
                 .modo-tactil .ui-button.ui-button-icon-only {
                     width: 36px !important;  /* Antes era 50px, ahora 36px */
                     height: 36px !important;
                     margin: 1px !important;
                 }

                 /* Iconos internos de PrimeFaces (Escala sutil) */
                 .modo-tactil .ui-button .ui-icon {
                     transform: scale(1.2) !important; /* Aumento del 20% en lugar del 50% */
                 }

                 /* Pestañas (Tabs) */
                 .modo-tactil .ui-tabs-nav li a {
                     padding: 8px 15px !important; /* Más compactas que el ajuste anterior */
                     font-size: 13px !important;
                 }

                 /* Checkbox de facturar */
                 .modo-tactil .ui-chkbox .ui-chkbox-box {
                     width: 22px !important; /* Tamaño intermedio ideal para el dedo */
                     height: 22px !important;
                 }

                 .modo-tactil .ui-chkbox-icon {
                     font-size: 18px !important;
                     margin-top: 1px !important;
                 }

                 /* Ajuste de Labels de la tabla */
                 .modo-tactil h:outputLabel, 
                 .modo-tactil .ui-outputlabel {
                     font-size: 12px !important;
                 }

                 /* Scrollpanel: un poco más de aire para no tocar bordes */
                 .modo-tactil .ui-scrollpanel-content {
                     padding: 8px !important;
                 }
                 
                 /* Contenedor principal de la cabecera del pedido */
                .cabecera-pedido-flex {
                    display: flex;
                    align-items: center; /* Centra todo verticalmente */
                    justify-content: space-between; /* Separa info de botones */
                    padding: 8px;
                    background-color: #f9f9f9;
                    border: 1px solid #e0e0e0;
                    border-radius: 5px 5px 0 0;
                }

                .info-izquierda {
                    display: flex;
                    align-items: center;
                    gap: 15px; /* Espacio entre checkbox, hora, alias y nombre */
                }

                .datos-cliente-col {
                    display: flex;
                    flex-direction: column; /* Nombre arriba, mascota abajo */
                }

                .input-alias {
                    width: 90px !important;
                    font-size: 11px !important;
                    text-align: center;
                    font-weight: bold;
                    color: #d9534f;
                    border: 1px solid #ccc !important;
                    padding: 3px !important;
                    background: #fff !important;
                }
                </style>

                <p:panel header="#{msg.administracion} #{msg.pedidoVenta}"
                         id="pnlPrincipal"
                         styleClass="#{login.empleado.cuenta.tipoPantalla eq 'TACTIL' ? 'modo-tactil' : ''}">
                    <p:tabView>
                        <c:forEach var="seccion"
                                   items="#{pedidoVentaBean.empresa.seccionList}">
                            <p:tab title="#{seccion.nombre}">
                                <p:dataGrid var="mesa" 
                                            value="#{seccion.mesaList}" 
                                            columns="2">
                                    <p:panel header="#{mesa.nombre}" 
                                             style="text-align:center;height:400px;width:100%;overflow:hidden;box-sizing:border-box;">
                                        <h:panelGrid columns="1"
                                                     id="pnlDatosCliente"
                                                     width="100%">
                                            <p:fragment autoUpdate="true">
                                                <h:panelGrid columns="5">
                                                    <p:commandButton value="#{msg.buscar} #{msg.cliente}"  
                                                                    icon="ui-icon-search"
                                                                    actionListener="#{pedidoVentaBean.verBusquedaClientes(mesa)}">
                                                     <p:ajax event="dialogReturn" 
                                                             process="pnlDatosCliente"
                                                             listener="#{pedidoVentaBean.onClienteSelect}" 
                                                             update=":frmCabecera:grMensajes, tablaFacturaVenta, scrollID" />
                                                    </p:commandButton>

                                                    <p:commandButton title="#{msg.nuevo} #{msg.cliente}"
                                                                     value="#{msg.nuevo} #{msg.cliente}"
                                                                     actionListener="#{pedidoVentaBean.verNuevoCliente(mesa)}" 
                                                                     icon="ui-icon-comment">
                                                          <p:ajax event="dialogReturn" 
                                                                  listener="#{pedidoVentaBean.onClienteSelect}"
                                                                  update=":frmCabecera:grMensajes, tablaFacturaVenta, scrollID"/>
                                                    </p:commandButton>
                                                    
                                                    <p:commandButton title="#{msg.consumidorFinal}"
                                                                     value="#{msg.consumidorFinal}"
                                                                     rendered="#{pedidoVentaBean.empresa.tipoEmpresa eq 1}"
                                                                     actionListener="#{pedidoVentaBean.consumidorFinal(mesa)}" 
                                                                     update=":frmCabecera:grMensajes, tablaFacturaVenta, scrollID"/>
                                                    
                                                    <p:commandButton icon="ui-icon-disk"
                                                                     value="#{msg.facturar}"
                                                                     title="#{msg.facturar}"
                                                                     update=":frmCabecera:grMensajes"
                                                                     actionListener="#{pedidoVentaBean.facturarPedidos(mesa)}"/>  
                                                    
                                                    <p:commandButton icon="ui-icon-disk"
                                                                     value="#{msg.registrar}"
                                                                     title="#{msg.registrar}"
                                                                     rendered="#{login.empleado.cuenta.empleado.empresa.tipoEmpresa eq 2}"
                                                                     update=":frmCabecera:grMensajes, tablaFacturaVenta, scrollID"
                                                                     actionListener="#{pedidoVentaBean.registrarPedidos(mesa)}">
                                                        <p:confirm header="#{msg.confirmacion}" 
                                                                   message="#{msg.registrar}" 
                                                                   icon="ui-icon-alert" />
                                                    </p:commandButton> 
                                                </h:panelGrid>
                                            </p:fragment>
                                        </h:panelGrid>
                                        <p:scrollPanel style="height:300px;width:100%;overflow-x:hidden;"
                                                       id="scrollID">
                                            <p:dataGrid var="items" 
                                                        id="tablaFacturaVenta"
                                                        value="#{mesa.listaPedidosVenta}" 
                                                        columns="1"
                                                        emptyMessage="#{msg.tablaVacia}">
                                                <div class="cabecera-pedido-flex">
                                                    <div class="info-izquierda">
                                                        <p:selectBooleanCheckbox value="#{items.facturar}">
                                                            <p:ajax/> 
                                                        </p:selectBooleanCheckbox>

                                                        <h:outputLabel value="#{items.fecha}" style="font-weight: bold; color: #555; font-size: 13px;">
                                                            <f:convertDateTime timeZone="#{parametrosApplication.timeZone}" pattern="HH:mm"/>
                                                        </h:outputLabel>

                                                        <!-- CAMPO ALIAS CORREGIDO -->
                                                        <p:inputText value="#{items.nombrePedido}" 
                                                                     placeholder="Alias" 
                                                                     maxlength="20"
                                                                     styleClass="input-alias">
                                                            <p:ajax event="change" listener="#{pedidoVentaBean.onHeaderEdit(items)}" process="@this" update=":frmCabecera:grMensajes"/>
                                                        </p:inputText>

                                                        <div class="datos-cliente-col">
                                                            <h:outputText value="#{items.cliente.persona.nombres} #{items.cliente.persona.apellidos}" 
                                                                           style="font-size: 13px; font-weight: bold; color: #333; text-transform: uppercase;"/>

                                                            <h:outputText value="#{items.mascota.nombre} (#{items.mascota.raza.nombre})" 
                                                                           rendered="#{pedidoVentaBean.empresa.tipoEmpresa eq 2}"
                                                                           style="font-size: 11px; color: #d9534f; font-weight: bold;"/>
                                                        </div>
                                                    </div>

                                                    <!-- PARTE DERECHA: Botones de Acción -->
                                                    <div style="display: flex; gap: 4px;">
                                                        <p:commandButton icon="ui-icon-minus" title="Ticket Cocina"
                                                                         actionListener="#{pedidoVentaBean.generarReporteBean(items, 2)}"
                                                                         style="width: 32px; height: 32px;"/>

                                                        <p:commandButton icon="ui-icon-plus" title="Pre-Factura"
                                                                         actionListener="#{pedidoVentaBean.generarReporteBean(items, 1)}"
                                                                         style="width: 32px; height: 32px;"/>

                                                        <p:commandButton icon="ui-icon-search" title="Agregar Productos"
                                                                         actionListener="#{pedidoVentaBean.verBusquedaProductosStock(items)}"
                                                                         style="width: 32px; height: 32px;">
                                                             <p:ajax event="dialogReturn" listener="#{pedidoVentaBean.onProductoSelect}" 
                                                                     update=":frmCabecera:pnlPrincipal, :frmCabecera:grMensajes" />
                                                        </p:commandButton>

                                                        <p:commandButton icon="ui-icon-refresh" title="Cambiar Mesa"
                                                                         actionListener="#{pedidoVentaBean.cambiarMesa(mesa,items)}"
                                                                         style="width: 32px; height: 32px;">
                                                            <p:ajax event="dialogReturn" listener="#{pedidoVentaBean.guardarCambioMesa}" 
                                                                    update=":frmCabecera:pnlPrincipal, :frmCabecera:grMensajes" />
                                                        </p:commandButton>

                                                        <p:commandButton icon="ui-icon-close" title="Eliminar Pedido"
                                                                         update=":frmCabecera:grMensajes, :frmCabecera:pnlPrincipal" 
                                                                         actionListener="#{pedidoVentaBean.eliminarPedidoMesa(mesa,items)}"
                                                                         style="width: 32px; height: 32px; background: #f2dede; border-color: #ebccd1;">
                                                            <p:confirm header="Confirmación" message="¿Eliminar todo el pedido?" icon="ui-icon-alert" />
                                                        </p:commandButton>
                                                    </div>
                                                </div>
                                                <p:dataTable var="itemsD" 
                                                             id="tablaFacturaVentaDetalle"
                                                             value="#{items.facturaDetalleList}"
                                                             emptyMessage="#{msg.tablaVacia}"
                                                             style="width: 100%">
                                                    
                                                    <f:facet name="header">
                                                        <p:panelGrid columns="2">
                                                            <h:outputLabel value="#{msg.iva}: #{items.iva}"/>
                                                            <h:outputLabel value="#{msg.totalM}: #{items.totalPagar}"/>
                                                        </p:panelGrid>
                                                    </f:facet>

                                                    <p:column headerText="#{msg.hora}"
                                                              style="text-align: left"
                                                              width="5%">
                                                          <h:outputLabel value="#{itemsD.fecha}"
                                                                         style="font-size: 10px">
                                                              <f:convertDateTime timeZone="#{parametrosApplication.timeZone}" 
                                                                                 pattern="#{parametrosApplication.formatoHoraSMS}"/>
                                                          </h:outputLabel>
                                                    </p:column>
                                                    
                                                    <p:column headerText="#{msg.iva}"
                                                              width="5%"
                                                              style="text-align:center">
                                                        <h:outputLabel value="#{itemsD.impuestoTarifa.descripcion}"/>
                                                    </p:column>

                                                   <p:column headerText="#{msg.productos}"
                                                             style="text-align: left">
                                                       <h:outputLabel value="#{itemsD.productoServicio.nombre}" 
                                                                      style="font-size: 10px"/>
                                                   </p:column>

                                                   <p:column headerText="#{msg.detalle}"
                                                             style="text-align: left">
                                                       <p:inputTextarea rows="2" cols="30" 
                                                                        autoResize="false" 
                                                                        maxlength="800"
                                                                        style="width: 90%"
                                                                        value="#{itemsD.descripcion}">
                                                           <p:ajax update=":frmCabecera:grMensajes"
                                                                   listener="#{pedidoVentaBean.onCellEdit(itemsD)}"/>
                                                       </p:inputTextarea>
                                                   </p:column>

                                                   <p:column headerText="Cant."
                                                             width="5%"
                                                             style="text-align:right">
                                                       <p:inputNumber value="#{itemsD.cantidad}" 
                                                                        decimalPlaces="2"
                                                                        minValue="0"
                                                                        inputStyle="width:80%;text-align: right ">
                                                            <p:ajax update=":frmCabecera:grMensajes, tablaFacturaVentaDetalle"
                                                                    listener="#{pedidoVentaBean.onCellEdit(itemsD)}"/>
                                                       </p:inputNumber> 
                                                   </p:column>
                                                    
                                                    <p:column headerText="#{msg.unitario}"
                                                              width="5%"
                                                              style="text-align:right">
                                                        <h:outputLabel value="#{itemsD.precioVentaUnitarioDescuento}">
                                                            <f:convertNumber type="number" 
                                                                             groupingUsed="true" 
                                                                             minFractionDigits="#{login.empleado.cuenta.empleado.empresa.decimales}"
                                                                             pattern="#0.00"/>
                                                        </h:outputLabel>
                                                    </p:column>
 
                                                    <p:column headerText="#{msg.total}"
                                                              width="5%"
                                                              style="text-align:right">
                                                        <h:outputLabel value="#{itemsD.subtotalConDescuento}">
                                                            <f:convertNumber type="number" 
                                                                             groupingUsed="true" 
                                                                             minFractionDigits="#{login.empleado.cuenta.empleado.empresa.decimales}"
                                                                             pattern="#0.00"/>
                                                        </h:outputLabel>
                                                    </p:column>
                                                    
                                                    <p:column headerText="Fact."
                                                             width="5%"
                                                             style="text-align:right">
                                                        <h:outputLabel value="#{itemsD.cantidadPorFacturar}" />
                                                   </p:column>

                                                    <p:column width="5%">      
                                                        <p:commandButton icon="ui-icon-close" 
                                                                         update=":frmCabecera:grMensajes, tablaFacturaVentaDetalle" 
                                                                         actionListener="#{pedidoVentaBean.eliminarDetalle(itemsD,items)}"
                                                                         title="#{msg.eliminar}">
                                                            <p:confirm header="#{msg.confirmacion}" 
                                                                       message="#{msg.eliminar}" 
                                                                       icon="ui-icon-alert" />
                                                        </p:commandButton>
                                                   </p:column>
                                               </p:dataTable>
                                            </p:dataGrid>
                                        </p:scrollPanel>
                                    </p:panel>
                                </p:dataGrid>
                            </p:tab>
                        </c:forEach>
                    </p:tabView>
                </p:panel>

            </ui:define>
        </ui:composition>
    </body>
</html>
