<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:c="http://java.sun.com/jsp/jstl/core"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:pm="http://primefaces.org/mobile">
    
    <f:view renderKitId="PRIMEFACES_MOBILE" />
    <h:head>
        <title>#{msg.tituloAplicacion}</title>
        <h:outputStylesheet name="css/default.css"/>
    </h:head>
    <h:body>
        <pm:page id="pedido">
            <pm:header>

                  <p:button outcome="pm:busquedaClientes" 
                            value=""
                            style="display: none"
                            id="btnBuscarClientes"/>

                  <p:button outcome="pm:buscarProducto" 
                            value=""
                            style="display: none"
                            id="btnBuscarProductos"/>

                  <p:button outcome="pm:cambiarMesa" 
                            value=""
                            style="display: none"
                            id="btnCambiarMesa"/>
                  
            </pm:header>
            <pm:content>
                <h:form id="frmCabecera">
                    
                   <p:growl id="grMensajes" 
                            widgetVar="grMensajes" 
                            showDetail="false"
                            sticky="true"/>
                   
                   <p:tabView id="tabPrincipal"
                              style="font-size: 12px">
                        <c:forEach var="seccion"
                                   items="#{pedidoVentaMovilBean.empresa.seccionList}">
                            <p:tab title="#{seccion.nombre}">
                                
                                <p:dataGrid var="mesa" 
                                            value="#{seccion.mesaList}" 
                                            columns="2"
                                            emptyMessage="#{msg.tablaVacia}"
                                            id="pnlMesa">

                                    <p:panel style="text-align:center;border: black solid 3px">
                                        <f:facet name="header">
                                            <p:fieldset style="border: black solid 2px;background-color: cadetblue;color: red">
                                                <h:outputLabel value="#{mesa.nombre}"
                                                               style="color: red;font-size: 15px;font-style: normal;"/>
                                                <h:panelGroup layout="block" styleClass="contenedor-header-mesa">
                                                    <p:commandButton actionListener="#{pedidoVentaMovilBean.verBusquedaClientes(mesa)}"
                                                                     icon="ui-icon-search" value="#{msg.buscar}"
                                                                     update=":busquedaClientes:frmCabecera2"
                                                                     onclick="document.getElementById('pedido:btnBuscarClientes').click();"/>

                                                    <p:commandButton actionListener="#{pedidoVentaMovilBean.consumidorFinal(mesa)}"
                                                                     icon="ui-icon-check" value="C. Final"
                                                                     update="pedido:frmCabecera:tabPrincipal"/>
                                                </h:panelGroup>
                                            </p:fieldset>
                                        </f:facet>

                                        <p:dataGrid var="items" 
                                                    id="tablaFacturaVenta"
                                                    value="#{mesa.listaPedidosVenta}" 
                                                    columns="1"
                                                    emptyMessage="#{msg.tablaVacia}">
                                            
                                            <h:panelGrid columns="1" 
                                                         width="100%"
                                                         style="border: black solid 2px;background-color: aquamarine">
                                                
                                                <h:panelGrid columns="1">
                                                    <h:panelGroup layout="block" styleClass="contenedor-acciones-pedido">
                                                        <p:commandButton icon="ui-icon-delete" title="#{msg.eliminar} #{msg.pedido}"
                                                                         style="background-color: tan"
                                                                         actionListener="#{pedidoVentaMovilBean.eliminarPedidoMesaSet(mesa,items)}"
                                                                         update="pedido:frmCabecera">
                                                            <p:confirm header="#{msg.confirmacion}" message="#{msg.eliminar}" icon="ui-icon-alert" />
                                                        </p:commandButton>

                                                        <p:commandButton actionListener="#{pedidoVentaMovilBean.seleccionarClienteDatos(items.cliente, false)}"
                                                                         style="background-color: tan" icon="ui-icon-edit"
                                                                         process="@this"
                                                                         disabled="#{items.cliente.persona.nombres eq 'CONSUMIDOR FINAL'}"
                                                                         update=":globalClientDialogForm:dlgDatosCliente"/> 

                                                        <p:commandButton actionListener="#{pedidoVentaMovilBean.cambiarCliente(items)}"
                                                                         icon="ui-icon-search" style="background-color: tan"
                                                                         onclick="document.getElementById('pedido:btnBuscarClientes').click();"/>

                                                        <p:commandButton icon="ui-icon-refresh" style="background-color: tan"
                                                                         actionListener="#{pedidoVentaMovilBean.cambiarMesa(mesa,items)}"
                                                                         onclick="document.getElementById('pedido:btnCambiarMesa').click();"/>

                                                        <p:commandButton icon="ui-icon-minus" style="background-color: tan" 
                                                                         actionListener="#{pedidoVentaMovilBean.imprimirReporte(2, items, 2)}">
                                                            <p:confirm header="#{msg.confirmacion}" message="#{msg.imprimir}" icon="ui-icon-alert" />
                                                        </p:commandButton> 

                                                        <p:commandButton icon="ui-icon-plus" style="background-color: tan" 
                                                                         actionListener="#{pedidoVentaMovilBean.imprimirReporte(2, items, 1)}">
                                                            <p:confirm header="#{msg.confirmacion}" message="#{msg.imprimir}" icon="ui-icon-alert" />
                                                        </p:commandButton> 
                                                    </h:panelGroup>
                                                    <p:selectOneMenu value="#{items.pago}">
                                                            <f:selectItem itemLabel="#{msg.efectivo}" itemValue="1"/>
                                                            <f:selectItem itemLabel="#{msg.transferencia}" itemValue="2"/>
                                                            <f:selectItem itemLabel="#{msg.tarjetaDebito}" itemValue="3"/>
                                                            <f:selectItem itemLabel="#{msg.tarjetaCredito}" itemValue="4"/>
                                                            <p:ajax event="change" 
                                                                    listener="#{pedidoVentaMovilBean.guardar(items)}" 
                                                                    process="@this"/>
                                                        </p:selectOneMenu>
                                                    <h:panelGroup layout="block" styleClass="flex-container">
                                                        <h:panelGroup layout="block" styleClass="flex-left-items">
                                                            <h:outputLabel value="#{items.fecha}" style="font-size: 15px; font-style: normal;">
                                                                <f:convertDateTime timeZone="#{parametrosApplicationMovil.timeZone}" 
                                                                                   pattern="#{parametrosApplicationMovil.formatoHoraSMS}"/>
                                                            </h:outputLabel>

                                                            <p:spacer width="5px"/>

                                                            <p:commandButton icon="ui-icon-comment"
                                                                             value="#{items.cliente.persona.nombreApellido}  $ #{items.total}"
                                                                             style="font-size: 12px"
                                                                             update="buscarProducto:frmCabecera4"
                                                                             actionListener="#{pedidoVentaMovilBean.verBusquedaProductosStock(items)}"
                                                                             onclick="document.getElementById('pedido:btnBuscarProductos').click();"/>
                                                        </h:panelGroup>
                                                    </h:panelGroup>
                                                </h:panelGrid> 
                                            </h:panelGrid>
                                            <br/>
                                        </p:dataGrid>
                                    </p:panel>
                                </p:dataGrid>
                            </p:tab>
                        </c:forEach>
                    </p:tabView>
                </h:form>
            </pm:content>
        </pm:page>
        <pm:page id="busquedaClientes">  
            <pm:content>
                <h:form id="frmCabecera2">
                    <h:panelGrid columns="2" width="100%">
                        
                        <p:button outcome="pm:pedido" 
                                  value="#{msg.regresar}" 
                                  icon="ui-icon-arrow-l"
                                  style="background-color: cadetblue"/>
                        
                        <p:commandButton style="background-color: cadetblue;font-size: 15px"
                                         icon="ui-icon-comment"
                                         title="#{msg.nuevo}"
                                         value="#{msg.nuevo}"
                                         process="@this"
                                         actionListener="#{pedidoVentaMovilBean.seleccionarClienteDatos(null, true)}"
                                         update="globalClientDialogForm:dlgDatosCliente"/> 
                    </h:panelGrid>
                    
                    <p:inputText type="search"
                                 style="font-size: 12px"
                                 value="#{pedidoVentaMovilBean.nombres}"
                                 placeholder="#{msg.buscar} #{msg.cliente} #{msg.nombre}">
                        <p:ajax event="keyup" update="busquedaClientes:frmCabecera2:pnlTablas" 
                                listener="#{pedidoVentaMovilBean.listarOpcion}"/>  
                    </p:inputText>
                    <p:inputText type="search"
                                 style="font-size: 12px"
                                 value="#{pedidoVentaMovilBean.cedula}"
                                 placeholder="#{msg.buscar} #{msg.cliente} #{msg.cedula}">
                        <p:ajax event="keyup" update="busquedaClientes:frmCabecera2:pnlTablas" 
                                listener="#{pedidoVentaMovilBean.listarOpcion}"/>  
                    </p:inputText>
                    <p:panelGrid columns="1"
                                 id="pnlTablas">
                        <p:dataTable var="clie" 
                                    id="tablaClientes"
                                    value="#{pedidoVentaMovilBean.lazyModel}" 
                                    paginator="true" 
                                    emptyMessage="#{msg.tablaVacia}"
                                    rows="10" 
                                    lazy="true"
                                    style="font-size: 12px;padding: 0"
                                    paginatorTemplate="{CurrentPageReport} {PreviousPageLink} {NextPageLink} {RowsPerPageDropdown}">

                           <p:column headerText="#{msg.cedula}"
                                     width="10%">
                                <p:commandButton  actionListener="#{pedidoVentaMovilBean.seleccionarCliente(clie)}"
                                                  title="#{msg.seleccionar}" 
                                                  icon="ui-icon-check"
                                                  value="#{clie.persona.cedula}" 
                                                  style="font-size: 12px;background-color: tan"
                                                  update="pedido:frmCabecera"
                                                  process="tablaClientes"
                                                  onclick="document.getElementById('busquedaClientes:frmCabecera2:btnPrint').click();"/>
                            </p:column>
                            <p:column style="vertical-align: middle"
                                      width="5%">
                                <p:commandButton style="background-color: cadetblue;font-size: 15px"
                                                 icon="ui-icon-comment"
                                                 process="tablaClientes"
                                                 actionListener="#{pedidoVentaMovilBean.seleccionarClienteDatos(clie, true)}"
                                                 update="globalClientDialogForm:dlgDatosCliente"/> 
                            </p:column>
                             
                            <p:column headerText="#{msg.nombres}"
                                      style="vertical-align: middle"
                                      width="80%">
                                <h:outputLabel value="#{clie.persona.nombres} #{clie.persona.apellidos}" 
                                               style="font-size: 12px;font-style: normal;"/>
                            </p:column>

                        </p:dataTable>
                    </p:panelGrid>
                    <p:button outcome="pm:pedido" 
                              value="#{msg.regresar}" 
                              id="btnPrint"
                              style="background-color: cadetblue"
                              icon="ui-icon-arrow-l"/>
                </h:form>
            </pm:content>
        </pm:page>
        <pm:page id="buscarProducto">
            <pm:content>
                <h:form id="frmCabecera4">

                    <h:panelGrid columns="2" width="100%" style="background: #eee; padding: 5px; border-radius: 5px; margin-bottom: 10px;">
                        <p:commandButton style="background-color: cadetblue; font-size: 15px"
                                         value="#{msg.finalizar}" 
                                         onclick="PF('dlg1').show();"
                                         icon="ui-icon-check"/>
                    </h:panelGrid>

                    <p:growl id="grMensajes4" showDetail="false" sticky="true"/>

                    <p:dialog header="#{msg.pedido}" widgetVar="dlg1" showEffect="pop" appendTo="@(body)" modal="true">
                        <p:panelGrid columns="1">
                            <p:commandButton icon="ui-icon-minus" style="background-color: darkslategrey;color: whitesmoke"
                                             value="#{msg.imprimir}" actionListener="#{pedidoVentaMovilBean.imprimirReporte(1, null, 2)}" 
                                             update="pedido:frmCabecera" onclick="document.getElementById('buscarProducto:frmCabecera4:btnPrintProducto').click();"/>

                            <p:button outcome="pm:pedido" id="btnPrintProducto" style="display: none"/>

                            <p:commandButton style="background-color: cadetblue"
                                             value="#{msg.inicio}" icon="ui-icon-arrow-l"
                                             update="pedido:frmCabecera"
                                             actionListener="#{pedidoVentaMovilBean.init}"
                                             onclick="document.getElementById('buscarProducto:frmCabecera4:btnPrintProducto').click();"/>
                        </p:panelGrid>
                    </p:dialog>

                    <p:panel style="border:none; background:none; padding:0;">
                        <p:tabView>
                            <p:ajax event="tabChange" listener="#{pedidoVentaMovilBean.onTabChange}" update="buscarProducto:frmCabecera4:datosTablasItems"/>
                            <c:forEach var="padre" items="#{pedidoVentaMovilBean.listaPadres}">
                                <p:tab title="#{padre.nombre}">
                                     <p:dataGrid var="hijo" value="#{padre.grupoProductoList}" columns="5" layout="grid">
                                        <p:commandButton value="#{hijo.nombre}" styleClass="btn-categoria-responsive"
                                                         update="buscarProducto:frmCabecera4:datosTablasItems" 
                                                         actionListener="#{pedidoVentaMovilBean.onNodeSelect(hijo)}"/>
                                    </p:dataGrid>
                                </p:tab>
                            </c:forEach>
                        </p:tabView>
                    </p:panel>

                    <br/>

                    <p:panelGrid columns="2" 
                                 style="width: 100%; table-layout: fixed;" 
                                 columnClasses="columna-productos, columna-seleccionados">

                        <h:panelGroup layout="block">
                            <p:inputText placeholder="#{msg.buscar}" type="search"
                                         value="#{pedidoVentaMovilBean.nombreProducto}"
                                         styleClass="buscador-productos-ajustado"
                                         style="font-size: 18px; width: 100%; margin-bottom: 5px;">
                                <p:ajax event="keyup" update="buscarProducto:frmCabecera4:datosTablasItems" 
                                        listener="#{pedidoVentaMovilBean.filtrarTablas}"/>  
                            </p:inputText>

                            <h:panelGroup id="datosTablasItems" layout="block" styleClass="contenedor-scroll-productos">
                                <p:dataTable var="producto" id="tablaProductos"
                                             emptyMessage="Seleccione un Grupo"
                                             value="#{pedidoVentaMovilBean.lazyModelStock}" 
                                             paginator="false" rows="50" lazy="true" 
                                             rendered="#{pedidoVentaMovilBean.opcion eq 'P'}">
                                    <p:column style="text-align: center" width="80%">
                                       <p:commandButton actionListener="#{pedidoVentaMovilBean.onRowSelect(producto.productoBodega)}"
                                                        value="#{producto.productoBodega.nombre}" 
                                                        style="font-size: 12px"
                                                        update="buscarProducto:frmCabecera4:tablaProductosSelc,buscarProducto:frmCabecera4:grMensajes4"/>
                                    </p:column>
                                    <p:column width="20%" style="text-align: right; vertical-align: middle;">
                                        <h:outputLabel value="#{producto.productoBodega.pvp}" style="font-weight: bold;">
                                            <f:convertNumber pattern="#0.00"/>
                                        </h:outputLabel>
                                    </p:column>
                                </p:dataTable>

                                <p:dataTable var="servicio" id="tablaServicios"
                                             value="#{pedidoVentaMovilBean.lazyModelServicios}" 
                                             paginator="false" rows="50" lazy="true" 
                                             emptyMessage="Seleccione un Grupo"
                                             rendered="#{pedidoVentaMovilBean.opcion eq 'S'}">
                                    <p:column style="text-align: center" width="80%">
                                       <p:commandButton actionListener="#{pedidoVentaMovilBean.onRowSelect(servicio)}"
                                                        value="#{servicio.nombre}" 
                                                        style="font-size: 12px"
                                                        update="buscarProducto:frmCabecera4:tablaProductosSelc,buscarProducto:frmCabecera4:grMensajes4"/>
                                    </p:column>
                                    <p:column width="20%" style="text-align: right; vertical-align: middle;">
                                        <h:outputLabel value="#{servicio.pvp}" style="font-weight: bold;">
                                            <f:convertNumber pattern="#0.00"/>
                                        </h:outputLabel>
                                    </p:column>
                                </p:dataTable>
                            </h:panelGroup>
                        </h:panelGroup>

                        <h:panelGrid columns="1" style="vertical-align: top">
                            <p:dataTable var="productoSl" id="tablaProductosSelc"
                                         value="#{pedidoVentaMovilBean.pedidoVentaSelc.facturaDetalleList}" 
                                         emptyMessage="#{msg.tablaVacia}">
                                <p:column width="100%">
                                    <div class="fila-nombre">
                                        <div style="flex: 1;">
                                            <h:outputText value="#{productoSl.productoServicio.nombre}" style="font-weight: bold; font-size: 12px; text-transform: uppercase;"/>
                                            <h:panelGroup style="font-size: 11px; color: #666; display: block;">
                                                $ <h:outputText value="#{productoSl.precioVentaUnitarioDescuento}"><f:convertNumber pattern="#0.00" /></h:outputText>
                                                x #{productoSl.cantidadInt}
                                            </h:panelGroup>
                                        </div>
                                        <h:outputText value="$ #{productoSl.subtotalConDescuento}" style="font-weight: bold; color: #d9534f; font-size: 15px;">
                                            <f:convertNumber pattern="#0.00" />
                                        </h:outputText>
                                    </div>
                                    <div class="fila-controles">
                                        <div style="display: flex; flex-direction: column; gap: 4px; width: 75px;">
                                            <p:commandButton value="#{productoSl.cantidadInt}" icon="ui-icon-delete" styleClass="btn-eliminar-cant"
                                                             actionListener="#{pedidoVentaMovilBean.eliminarProductoSelc(productoSl)}" update="tablaProductosSelc">
                                                 <p:confirm header="#{msg.confirmacion}" message="#{msg.eliminar}" icon="ui-icon-alert" />
                                            </p:commandButton>
                                            <div style="display: flex; gap: 3px;">
                                                <p:commandButton icon="ui-icon-arrow-l" styleClass="btn-ajuste" actionListener="#{pedidoVentaMovilBean.restar(productoSl)}" update="tablaProductosSelc"/>
                                                <p:commandButton icon="ui-icon-arrow-r" styleClass="btn-ajuste" actionListener="#{pedidoVentaMovilBean.sumar(productoSl)}" update="tablaProductosSelc"/>
                                            </div>
                                        </div>
                                        <p:inputTextarea placeholder="Notas..." rows="2" style="flex: 1; font-size: 11px;" value="#{productoSl.descripcion}">
                                            <p:ajax listener="#{pedidoVentaMovilBean.onCellEdit(productoSl)}"/>
                                        </p:inputTextarea> 
                                    </div>
                                </p:column>
                            </p:dataTable>
                        </h:panelGrid>
                    </p:panelGrid>

                    <br/>
                    <p:commandButton style="background-color: cadetblue"
                                     value="#{msg.finalizar}" 
                                     icon="ui-icon-check"
                                     onclick="PF('dlg1').show();"/>  

                </h:form>
            </pm:content>
        </pm:page>
        <pm:page id="cambiarMesa">
            <pm:content>
                <h:form id="frmCabecera5">
                    <p:button outcome="pm:pedido" 
                              style="background-color: cadetblue"
                              value="#{msg.regresar}" 
                              icon="ui-icon-arrow-l"/>
                    <p:dataGrid var="seccion" 
                                id="tablaSecciones"
                                value="#{pedidoVentaMovilBean.empresa.seccionList}" 
                                columns="1"
                                emptyMessage="#{msg.tablaVacia}">

                        <p:dataTable var="mesaC" 
                                     value="#{seccion.mesaList}" 
                                     emptyMessage="#{msg.tablaVacia}">

                          <p:column headerText="#{seccion.nombre}">
                              <h:outputLabel value="#{mesaC.nombre}" 
                                             style="font-size: 12px"/>
                          </p:column>

                          <p:column headerText="#{msg.opcion}"
                                    style="text-align: center"
                                    width="60">

                              <p:commandButton  actionListener="#{pedidoVentaMovilBean.guardarCambioMesa(mesaC)}"
                                                title="#{msg.seleccionar}" 
                                                icon="ui-icon-check"
                                                style="font-size: 12px;background-color: tan"
                                                update="pedido:frmCabecera"
                                                onclick="document.getElementById('cambiarMesa:frmCabecera5:btnPrintCambio').click();"/>
                          </p:column>
                       </p:dataTable>
                    </p:dataGrid>
                    <p:button outcome="pm:pedido" 
                              style="background-color: cadetblue"
                              value="#{msg.regresar}" 
                              id="btnPrintCambio"
                              icon="ui-icon-arrow-l"/>
                </h:form>
            </pm:content>
        </pm:page>
        
        <h:form id="globalClientDialogForm">
             <p:confirmDialog showEffect="fade"
                                     hideEffect="explode"
                                     style="z-index: 3001"
                                     global="true">
                        <h:panelGrid columns="2">
                            <p:commandButton value="#{msg.si}"  
                                             styleClass="ui-confirmdialog-yes" 
                                             icon="ui-icon-check"/>
                            <p:commandButton value="#{msg.no}"  
                                             styleClass="ui-confirmdialog-no" 
                                             icon="ui-icon-delete"/>
                        </h:panelGrid>
                    </p:confirmDialog>
            
            <p:dialog header="#{msg.cliente}"
                      widgetVar="dlgDatosCliente" 
                      showEffect="pop"
                      modal="true"
                      appendTo="@(body)" 
                      fitViewport="true"   
                      responsive="true"
                      closable="false"
                      id="dlgDatosCliente">
                
                <p:messages id="dialogMessages" showDetail="false" closable="true"
                            autoUpdate="true"/>
                    
                <pm:field>
                    <h:outputLabel value="#{msg.tipoIdentificacion}" 
                                   style="font-size: 15px"/>
                    <p:selectOneMenu value="#{pedidoVentaMovilBean.cliente.persona.tipoIdentificacion.codigo}">
                        <f:selectItems value="#{pedidoVentaMovilBean.listaTipoIdentificacion}" 
                                       var="tipoId"
                                       itemLabel="#{tipoId.nombre}"
                                       itemValue="#{tipoId.codigo}"/>
                    </p:selectOneMenu>
                </pm:field>

                <pm:field>
                    <h:outputLabel value="#{msg.numero}" 
                                   style="font-size: 15px"/>
                    <p:inputText value="#{pedidoVentaMovilBean.cliente.persona.cedula}"
                                 maxlength="13"
                                 required="true"
                                 requiredMessage="#{msg.numero} : #{msg.campoRequerido}"
                                 style="background-color: khaki;font-size: 12px"
                                 validator="com.jvc.factunet.movil.validador.ValidarCedulaRucNuloMovil">
                        <p:keyFilter regEx="/[\d]/"
                                     preventPaste="false"/>
                    </p:inputText>
                </pm:field>

                <pm:field>
                    <h:outputLabel value="#{msg.nombres}"
                                   style="font-size: 15px"/>
                    <p:inputText value="#{pedidoVentaMovilBean.cliente.persona.nombres}"
                                 maxlength="50"
                                 required="true"
                                  requiredMessage="#{msg.nombres} : #{msg.campoRequerido}"
                                 style="background-color: khaki;font-size: 12px"/>
                </pm:field>

                <pm:field>
                    <h:outputLabel value="#{msg.apellidos}"
                                   style="font-size: 15px"/>
                    <p:inputText value="#{pedidoVentaMovilBean.cliente.persona.apellidos}"
                                 maxlength="50"
                                 style="font-size: 12px"/>
                </pm:field>

                <pm:field>
                    <h:outputLabel value="#{msg.correo}"
                                   style="font-size: 15px"/>
                    <p:inputText value="#{pedidoVentaMovilBean.cliente.persona.email}"
                                 size="35"
                                 maxlength="50"
                                 style="font-size: 12px"
                                 validatorMessage="#{msg.emailInvalido}">
                         <f:validator validatorId="com.jvc.factunet.movil.validador.ValidarEmailMovil" />
                    </p:inputText>
                </pm:field>

                <pm:field>
                    <h:outputLabel value="#{msg.telefono}"
                                   style="font-size: 15px"/>
                    <p:inputText value="#{pedidoVentaMovilBean.cliente.persona.telefono}"
                                 maxlength="13"
                                 style="font-size: 12px">
                        <p:keyFilter regEx="/[\d]/"/>
                    </p:inputText>
                </pm:field>

                <pm:field>
                    <h:outputLabel value="#{msg.direccion}" 
                                   style="font-size: 15px"/>
                    <p:inputTextarea rows="2" cols="30" 
                                     autoResize="false" 
                                     style="font-size: 12px"
                                     value="#{pedidoVentaMovilBean.cliente.persona.direccion}"/>
                </pm:field>

                <pm:field>
                    <script>
                        //<![CDATA[
                        function handleSaveComplete(args) {
                            if (args && !args.validationFailed) {
                                document.getElementById('busquedaClientes:frmCabecera2:btnPrint').click();
                            }
                        }
                        //]]>
                    </script>

                    <p:commandButton value="#{msg.guardar}"
                                     icon="ui-icon-check" 
                                     process="dlgDatosCliente,@this"
                                     style="background-color: darkslategrey;color: whitesmoke"
                                     actionListener="#{pedidoVentaMovilBean.guardarCliente}"
                                     update="pedido:frmCabecera,dialogMessages"
                                     oncomplete="handleSaveComplete(args)"/>
                    
                   <p:commandButton style="background-color: cadetblue"
                                    value="#{msg.cerrar}" 
                                    icon="ui-icon-arrow-l"
                                    type="button"
                                    onclick="PF('dlgDatosCliente').hide(); return false;"/>
                        
                </pm:field>

            </p:dialog>
        </h:form>
    </h:body>
</html>
